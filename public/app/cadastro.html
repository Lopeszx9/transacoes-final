<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nova transação</title>
<link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<div class="app-shell">

  <aside class="sidebar">
    <div class="brand">
      <div class="mark">R$</div>
      <strong>Transações</strong>
    </div>

    <a href="transacoes.html" class="nav-item">📄 Transações</a>
    <a href="cadastro.html" class="nav-item active">➕ Nova transação</a>

    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="avatar" id="userInitial">?</div>
        <span id="userName">Carregando...</span>
      </div>
      <button class="logout-btn" id="logoutBtn">Sair</button>
    </div>
  </aside>

  <main class="main">
    <div class="main-header">
      <div>
        <h1 id="pageTitle">Nova transação</h1>
        <p>Preencha os dados abaixo e clique em salvar.</p>
      </div>
    </div>

    <div class="error-box" id="errorBox"></div>

    <form class="form-card" id="txForm">
      <div class="form-grid">
        <div class="field full">
          <label for="value">Valor (R$)</label>
          <input type="number" id="value" name="value" step="0.01" min="0.01" placeholder="0,00" required />
        </div>

        <div class="field full">
          <label for="cpf">CPF do portador</label>
          <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14" required />
        </div>

        <div class="field full">
          <label for="status">Status</label>
          <select id="status" name="status">
            <option value="em_processamento">Em processamento</option>
            <option value="aprovada">Aprovada</option>
            <option value="negada">Negada</option>
          </select>
        </div>

        <div class="field full">
          <label for="document">Documento comprovante (PDF ou imagem, opcional)</label>
          <input type="file" id="document" name="document" accept=".pdf,.jpg,.jpeg,.png" />
          <div class="current-doc" id="currentDoc"></div>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn" id="submitBtn">Salvar</button>
        <a href="transacoes.html" class="btn ghost">Cancelar</a>
      </div>
    </form>
  </main>

</div>

<script src="assets/js/api.js"></script>
<script src="assets/js/cadastro.js"></script>
</body>
</html>
